version: 2
updates:
  # Single entry for the whole Yarn Workspaces monorepo
  # Dependabot will scan all workspace package.json files
  # and update the single root yarn.lock
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      # Group all security fixes into one PR
      security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      # Group all version updates into one PR
      version-updates:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      # Expo-managed packages — use `npx expo doctor` instead
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      - dependency-name: "@expo/*"
      - dependency-name: "@react-native/*"
