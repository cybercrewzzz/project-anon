version: 2
updates:
  # ──────────────────────────────────────────────
  # MOBILE (Expo) — ignore Expo-managed packages
  # Expo pins exact dependency versions per SDK.
  # Use `npx expo doctor` to manage these instead.
  # ──────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      mobile-security:
        applies-to: security-updates
        patterns:
          - "*"
      mobile-deps:
        applies-to: version-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "expo"
      - dependency-name: "expo-*"
      - dependency-name: "react-native"
      - dependency-name: "react-native-*"
      - dependency-name: "@expo/*"
      - dependency-name: "@react-native/*"
      - dependency-name: "react"
      - dependency-name: "react-dom"

  # ──────────────────────────────────────────────
  # ADMIN (Next.js) — safe to update normally
  # ──────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/admin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      admin-security:
        applies-to: security-updates
        patterns:
          - "*"
      admin-deps:
        applies-to: version-updates
        patterns:
          - "*"

  # ──────────────────────────────────────────────
  # BACKEND (NestJS) — safe to update normally
  # ──────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      backend-security:
        applies-to: security-updates
        patterns:
          - "*"
      backend-deps:
        applies-to: version-updates
        patterns:
          - "*"
